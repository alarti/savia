<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="sidebar">
        <div id="sidebar-header">
            <button id="new-convo-btn"><span>New Conversation</span></button>
        </div>
        <div id="conversations-list">
            <!-- Conversation history will be loaded here -->
        </div>
        <div id="auth-container">
            <button id="login-btn">Login with Google</button>
            <div id="user-menu" class="hidden">
                <div id="user-info-trigger">
                    <img id="user-avatar" src="" alt="User Avatar">
                    <span id="user-name"></span>
                </div>
                <div id="user-popover" class="hidden">
                    <button id="settings-btn"><span>Settings</span></button>
                    <button id="logout-btn"><span>Logout</span></button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <header>
            <button id="menu-toggle-btn">☰</button>
            <h1>AI Chat</h1>
        </header>

        <main id="chat-container">
            <div id="chat-messages"></div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Ask the AI something..." autocomplete="off" disabled>
                <button type="submit" disabled>Send</button>
            </form>
        </main>
    </div>

    <script src="script.js"></script>

    <div id="modal-overlay" class="hidden"></div>
    <div id="settings-modal" class="hidden">
        <div class="modal-header">
            <h2>Advanced Settings</h2>
            <button id="close-modal-btn">×</button>
        </div>
        <div class="modal-body">
            <div class="setting">
                <label for="temperature-slider">AI Temperature (not functional)</label>
                <input type="range" id="temperature-slider" name="temperature" min="0" max="1" step="0.1" value="0.7" disabled>
                <span id="temperature-value">0.7</span>
            </div>
            <hr>
            <div class="danger-zone">
                <h4>Danger Zone</h4>
                <p>This action cannot be undone. This will permanently delete all of your conversations.</p>
                <button id="clear-all-btn" class="danger-btn">Clear All Conversations</button>
            </div>
        </div>
    </div>
</body>
</html>
